<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1170" font-family="Helvetica, Arial, sans-serif">
  <rect width="1080" height="1170" fill="#ffffff"/>
  <text x="40" y="40" font-size="22" font-weight="bold" fill="#111">CYD-S3 Stereo — external audio wiring (FNK0104B / FNK0104S)</text>
  <text x="40" y="62" font-size="13" fill="#555">Clocks shared by all boards. Amps get volume-controlled data (I2S0); line-out gets fixed-level data (I2S1). All grounds common.</text>

  <!-- ============ Board ============ -->
  <rect x="40" y="110" width="260" height="450" rx="10" fill="#f3f4f6" stroke="#111" stroke-width="2"/>
  <text x="170" y="140" font-size="16" font-weight="bold" text-anchor="middle" fill="#111">Freenove FNK0104</text>
  <text x="170" y="158" font-size="12" text-anchor="middle" fill="#555">ESP32-S3 touch display</text>
  <text x="170" y="510" font-size="11" text-anchor="middle" fill="#b91c1c" font-weight="bold">GPIO 15/16 (I2C header): never use</text>
  <text x="170" y="524" font-size="11" text-anchor="middle" fill="#b91c1c">for audio — touch + codec live there</text>
  <text x="170" y="544" font-size="11" text-anchor="middle" fill="#777">confirm pin locations with continuity check</text>

  <!-- board pins -->
  <g font-size="13" font-weight="bold">
    <circle cx="300" cy="190" r="5" fill="#16a34a"/><text x="290" y="194" text-anchor="end" fill="#16a34a">GPIO 2  (BCLK)</text>
    <circle cx="300" cy="230" r="5" fill="#2563eb"/><text x="290" y="234" text-anchor="end" fill="#2563eb">GPIO 3  (LRC)</text>
    <circle cx="300" cy="270" r="5" fill="#ea580c"/><text x="290" y="274" text-anchor="end" fill="#ea580c">GPIO 21 (amp DIN)</text>
    <circle cx="300" cy="310" r="5" fill="#9333ea"/><text x="290" y="314" text-anchor="end" fill="#9333ea">GPIO 14 (line DIN)</text>
    <circle cx="300" cy="390" r="5" fill="#dc2626"/><text x="290" y="394" text-anchor="end" fill="#dc2626">5V</text>
    <circle cx="300" cy="430" r="5" fill="#374151"/><text x="290" y="434" text-anchor="end" fill="#374151">GND</text>
  </g>

  <!-- ============ Bus trunks ============ -->
  <!-- BCLK green: amps + DAC -->
  <g stroke="#16a34a" stroke-width="2.5" fill="none">
    <polyline points="300,190 360,190"/>
    <polyline points="360,168 360,600"/>
    <polyline points="360,168 640,168"/>
    <polyline points="360,368 640,368"/>
    <polyline points="360,600 640,600"/>
  </g>
  <g fill="#16a34a"><circle cx="360" cy="190" r="4"/><circle cx="360" cy="368" r="4"/></g>

  <!-- LRC blue: amps + DAC -->
  <g stroke="#2563eb" stroke-width="2.5" fill="none">
    <polyline points="300,230 392,230"/>
    <polyline points="392,192 392,624"/>
    <polyline points="392,192 640,192"/>
    <polyline points="392,392 640,392"/>
    <polyline points="392,624 640,624"/>
  </g>
  <g fill="#2563eb"><circle cx="392" cy="230" r="4"/><circle cx="392" cy="392" r="4"/></g>

  <!-- amp DIN orange: both amps only (volume-controlled I2S0) -->
  <g stroke="#ea580c" stroke-width="2.5" fill="none">
    <polyline points="300,270 424,270"/>
    <polyline points="424,216 424,416"/>
    <polyline points="424,216 640,216"/>
    <polyline points="424,416 640,416"/>
  </g>
  <g fill="#ea580c"><circle cx="424" cy="270" r="4"/><circle cx="424" cy="216" r="4"/></g>

  <!-- line DIN purple: DAC only (fixed-level I2S1) -->
  <g stroke="#9333ea" stroke-width="2.5" fill="none">
    <polyline points="300,310 456,310"/>
    <polyline points="456,310 456,648"/>
    <polyline points="456,648 640,648"/>
  </g>
  <text x="466" y="640" font-size="10" fill="#9333ea">I2S1 fixed line-out</text>

  <!-- 5V red: Vin x3 + amp SD channel select -->
  <g stroke="#dc2626" stroke-width="2.5" fill="none">
    <polyline points="300,390 488,390"/>
    <polyline points="488,120 488,552"/>
    <polyline points="488,120 640,120"/>
    <polyline points="488,240 640,240"/>
    <polyline points="488,320 640,320"/>
    <polyline points="488,440 520,440"/>
    <polyline points="520,440 528,428 540,452 552,428 564,452 576,428 584,440 640,440"/>
    <polyline points="488,552 640,552"/>
  </g>
  <g fill="#dc2626">
    <circle cx="488" cy="390" r="4"/><circle cx="488" cy="120" r="4"/><circle cx="488" cy="240" r="4"/>
    <circle cx="488" cy="320" r="4"/><circle cx="488" cy="440" r="4"/>
  </g>
  <text x="552" y="470" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">470 kΩ</text>

  <!-- GND dark -->
  <g stroke="#374151" stroke-width="2.5" fill="none">
    <polyline points="300,430 520,430"/>
    <polyline points="520,144 520,676"/>
    <polyline points="520,144 640,144"/>
    <polyline points="520,344 640,344"/>
    <polyline points="520,576 640,576"/>
    <polyline points="520,676 640,676"/>
  </g>
  <g fill="#374151"><circle cx="520" cy="430" r="4"/><circle cx="520" cy="144" r="4"/><circle cx="520" cy="344" r="4"/><circle cx="520" cy="576" r="4"/></g>

  <!-- ============ MAX98357A LEFT ============ -->
  <rect x="640" y="96" width="220" height="170" rx="8" fill="#eef6ff" stroke="#111" stroke-width="2"/>
  <text x="750" y="116" font-size="14" font-weight="bold" text-anchor="middle" fill="#111">MAX98357A — LEFT</text>
  <g font-size="12" fill="#111">
    <text x="652" y="124">Vin</text>
    <text x="652" y="148">GND</text>
    <text x="652" y="172">BCLK</text>
    <text x="652" y="196">LRC</text>
    <text x="652" y="220">DIN</text>
    <text x="652" y="244">SD</text>
  </g>
  <text x="700" y="244" font-size="11" fill="#b91c1c">5V direct (&gt;1.4V) → LEFT</text>
  <text x="750" y="260" font-size="10" text-anchor="middle" fill="#777">GAIN: leave unconnected (9 dB)</text>
  <g stroke="#111" stroke-width="2" fill="none">
    <polyline points="860,150 920,150"/>
    <polyline points="860,180 920,180"/>
    <rect x="920" y="140" width="16" height="50" fill="#f3f4f6"/>
    <polygon points="936,140 968,120 968,210 936,190" fill="#f3f4f6"/>
  </g>
  <text x="930" y="230" font-size="12" fill="#111">Speaker L (4Ω 3W)</text>
  <text x="866" y="145" font-size="10" fill="#555">+</text><text x="866" y="196" font-size="10" fill="#555">−</text>

  <!-- ============ MAX98357A RIGHT ============ -->
  <rect x="640" y="296" width="220" height="170" rx="8" fill="#eef6ff" stroke="#111" stroke-width="2"/>
  <text x="750" y="316" font-size="14" font-weight="bold" text-anchor="middle" fill="#111">MAX98357A — RIGHT</text>
  <g font-size="12" fill="#111">
    <text x="652" y="324">Vin</text>
    <text x="652" y="348">GND</text>
    <text x="652" y="372">BCLK</text>
    <text x="652" y="396">LRC</text>
    <text x="652" y="420">DIN</text>
    <text x="652" y="444">SD</text>
  </g>
  <text x="700" y="444" font-size="11" fill="#b91c1c">≈1.2V via 470k → RIGHT</text>
  <text x="750" y="460" font-size="10" text-anchor="middle" fill="#777">GAIN: leave unconnected (9 dB)</text>
  <g stroke="#111" stroke-width="2" fill="none">
    <polyline points="860,350 920,350"/>
    <polyline points="860,380 920,380"/>
    <rect x="920" y="340" width="16" height="50" fill="#f3f4f6"/>
    <polygon points="936,340 968,320 968,410 936,390" fill="#f3f4f6"/>
  </g>
  <text x="930" y="430" font-size="12" fill="#111">Speaker R (4Ω 3W)</text>
  <text x="866" y="345" font-size="10" fill="#555">+</text><text x="866" y="396" font-size="10" fill="#555">−</text>

  <!-- ============ PCM5102A ============ -->
  <rect x="640" y="510" width="220" height="196" rx="8" fill="#fdf4ff" stroke="#111" stroke-width="2"/>
  <text x="750" y="530" font-size="14" font-weight="bold" text-anchor="middle" fill="#111">PCM5102A DAC (line out)</text>
  <g font-size="12" fill="#111">
    <text x="652" y="556">VIN</text>
    <text x="652" y="580">GND</text>
    <text x="652" y="604">BCK</text>
    <text x="652" y="628">LCK</text>
    <text x="652" y="652">DIN</text>
    <text x="652" y="676">SCK → GND</text>
  </g>
  <text x="750" y="696" font-size="9" text-anchor="middle" fill="#777">solder pads: see detail below</text>
  <g stroke="#111" stroke-width="2" fill="none">
    <polyline points="860,560 930,560"/>
    <polyline points="860,600 930,600"/>
  </g>
  <circle cx="945" cy="560" r="13" fill="#fff" stroke="#b91c1c" stroke-width="4"/>
  <circle cx="945" cy="600" r="13" fill="#fff" stroke="#6b7280" stroke-width="4"/>
  <text x="968" y="565" font-size="12" fill="#111">RCA R (red)</text>
  <text x="968" y="605" font-size="12" fill="#111">RCA L (white)</text>
  <text x="875" y="632" font-size="10" fill="#777">via 3.5mm jack or L/R/G pads</text>

  <!-- ============ Notes ============ -->
  <rect x="40" y="726" width="620" height="150" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="56" y="750" font-size="13" font-weight="bold" fill="#92400e">Channel select is static; mute lives in firmware</text>
  <g font-size="12" fill="#78350f">
    <text x="56" y="772">Amp SD thresholds: &lt;0.16V off · 0.16–0.77V (L+R)/2 · 0.77–1.4V RIGHT · &gt;1.4V LEFT</text>
    <text x="56" y="794">"External speakers" switch zeroes the amps' data (GPIO 21 stream) — the line-out</text>
    <text x="56" y="810">(GPIO 14, I2S1) keeps playing at its own level. Onboard speaker follows the amp stream.</text>
    <text x="56" y="832">Enable "Fixed line-out" in settings; the Line-out slider sets the RCA level independent</text>
    <text x="56" y="848">of volume. Alt DIN pin: GPIO 43 (TXD0). Adafruit amps: remove their 1MΩ SD→Vin resistor.</text>
    <text x="56" y="868" font-size="11" fill="#b91c1c" font-weight="bold">Never put audio on GPIO 15/16 — that's the live I2C bus (touch + codec).</text>
  </g>

  <!-- ============ PCM5102A solder pad detail ============ -->
  <text x="40" y="920" font-size="15" font-weight="bold" fill="#111">GY-PCM5102 solder pads — ship OPEN, board is silent until bridged</text>

  <!-- top side -->
  <rect x="40" y="944" width="330" height="160" rx="8" fill="#f5f3ff" stroke="#111" stroke-width="2"/>
  <text x="205" y="966" font-size="13" font-weight="bold" text-anchor="middle" fill="#111">Top (component side)</text>
  <rect x="70" y="984" width="200" height="96" rx="6" fill="#7c3aed" opacity="0.25" stroke="#7c3aed"/>
  <text x="170" y="1014" font-size="11" text-anchor="middle" fill="#4c1d95">chip + header pins</text>
  <!-- jumper pads -->
  <rect x="226" y="1044" width="14" height="10" fill="#fbbf24" stroke="#92400e"/>
  <rect x="244" y="1044" width="14" height="10" fill="#fbbf24" stroke="#92400e"/>
  <rect x="238" y="1045" width="8" height="8" fill="#92400e"/>
  <polyline points="258,1049 300,1049" stroke="#b91c1c" stroke-width="2" fill="none"/>
  <text x="304" y="1042" font-size="11" fill="#b91c1c" font-weight="bold">SCK=GND</text>
  <text x="304" y="1056" font-size="11" fill="#b91c1c">solder this</text>
  <text x="205" y="1094" font-size="10" text-anchor="middle" fill="#555">jumper next to the SCK pin</text>

  <!-- underside -->
  <rect x="410" y="944" width="450" height="160" rx="8" fill="#f5f3ff" stroke="#111" stroke-width="2"/>
  <text x="635" y="966" font-size="13" font-weight="bold" text-anchor="middle" fill="#111">Underside — bridge center pad to the marked side</text>
  <!-- four pad groups: 1 FLT->L, 2 DEMP->L, 3 XSMT->H, 4 FMT->L -->
  <g font-size="12" fill="#111">
    <!-- group template: H pad, center, L pad -->
    <!-- 1 FLT -> L -->
    <text x="470" y="1000" text-anchor="middle" font-weight="bold">1 · FLT</text>
    <text x="440" y="1024" text-anchor="end" fill="#555">H</text>
    <rect x="446" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="464" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="482" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="466" y="1014" width="28" height="10" fill="#16a34a"/>
    <text x="502" y="1024" fill="#16a34a" font-weight="bold">L ✓</text>
    <!-- 2 DEMP -> L -->
    <text x="580" y="1000" text-anchor="middle" font-weight="bold">2 · DEMP</text>
    <text x="550" y="1024" text-anchor="end" fill="#555">H</text>
    <rect x="556" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="574" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="592" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="576" y="1014" width="28" height="10" fill="#16a34a"/>
    <text x="612" y="1024" fill="#16a34a" font-weight="bold">L ✓</text>
    <!-- 3 XSMT -> H -->
    <text x="700" y="1000" text-anchor="middle" font-weight="bold">3 · XSMT</text>
    <text x="670" y="1024" text-anchor="end" fill="#16a34a" font-weight="bold">✓ H</text>
    <rect x="676" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="694" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="712" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="678" y="1014" width="28" height="10" fill="#16a34a"/>
    <text x="732" y="1024" fill="#555">L</text>
    <!-- 4 FMT -> L -->
    <text x="810" y="1000" text-anchor="middle" font-weight="bold">4 · FMT</text>
    <text x="780" y="1024" text-anchor="end" fill="#555">H</text>
    <rect x="786" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="804" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="822" y="1012" width="14" height="14" fill="#fbbf24" stroke="#92400e"/>
    <rect x="806" y="1014" width="28" height="10" fill="#16a34a"/>
    <text x="842" y="1024" fill="#16a34a" font-weight="bold">L ✓</text>
  </g>
  <g font-size="11" fill="#555">
    <text x="470" y="1054" text-anchor="middle">filter: normal</text>
    <text x="580" y="1054" text-anchor="middle">de-emphasis: off</text>
    <text x="700" y="1054" text-anchor="middle">un-mute (open = SILENT)</text>
    <text x="810" y="1054" text-anchor="middle">format: I2S</text>
  </g>
  <text x="635" y="1086" font-size="11" text-anchor="middle" fill="#92400e" font-weight="bold">XSMT is the one that bites: left open, everything works but no sound comes out.</text>
</svg>
