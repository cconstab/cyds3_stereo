<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CYD-S3 Firmware Server</title>
<style>
body{font-family:system-ui,sans-serif;background:#0f1115;color:#e5e7eb;max-width:880px;margin:0 auto;padding:24px}
h1{font-size:1.4em}h2{font-size:1.1em;margin-top:2em;border-bottom:1px solid #2d333b;padding-bottom:6px}
table{width:100%;border-collapse:collapse;font-size:.92em}
td,th{text-align:left;padding:8px;border-bottom:1px solid #22272e}
th{color:#9ca3af;font-weight:600}
input,textarea,button{background:#1c2128;color:#e5e7eb;border:1px solid #363c45;border-radius:6px;padding:9px;font-size:1em;box-sizing:border-box}
button{background:#2563eb;border:0;cursor:pointer;font-weight:600}
button.small{padding:4px 10px;font-size:.85em;background:#374151}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid .full{grid-column:1/-1}
.cur{color:#22c55e;font-weight:700}
#msg{margin-top:8px;min-height:1.2em}
a{color:#60a5fa}
small{color:#8b949e}
</style>
</head>
<body>
<h1>CYD-S3 Stereo — Firmware Server</h1>
<p><small>Devices poll <code>/api/manifest</code> and update themselves.
New board? Use the <a href="/flash.html">browser flasher</a> (Chrome/Edge, USB).</small></p>

<h2>Publish new firmware</h2>
<form id="up" class="grid">
  <input name="version" placeholder="Version (e.g. 0.2.0)" required>
  <input name="token" placeholder="Upload token" type="password">
  <label class="full">App image (firmware.bin — used for OTA)<br><input type="file" name="firmware" required></label>
  <label class="full">Merged image (firmware-merged.bin — optional, enables browser flashing)<br><input type="file" name="merged"></label>
  <textarea class="full" name="notes" placeholder="Release notes" rows="2"></textarea>
  <button class="full">Upload &amp; publish</button>
</form>
<div id="msg"></div>

<h2>Versions</h2>
<table id="versions"><thead><tr><th>Version</th><th>Uploaded</th><th>Size</th><th>SHA-256</th><th>Notes</th><th></th></tr></thead><tbody></tbody></table>

<h2>Device check-ins</h2>
<table id="devices"><thead><tr><th>Device ID</th><th>Type</th><th>Firmware</th><th>Last seen</th><th>IP</th></tr></thead><tbody></tbody></table>

<script>
const $=s=>document.querySelector(s);
async function refresh(){
  const v=await (await fetch('/api/versions')).json();
  $('#versions tbody').innerHTML=(v.history||[]).map(h=>`<tr>
    <td>${h.version===v.current?`<span class=cur>${h.version} ✓</span>`:h.version}</td>
    <td><small>${h.uploadedAt?.replace('T',' ').slice(0,16)||''}</small></td>
    <td><small>${(h.size/1024).toFixed(0)} KB</small></td>
    <td><small>${h.sha256.slice(0,12)}…</small></td>
    <td><small>${h.notes||''}</small></td>
    <td>${h.version!==v.current?`<button class=small onclick="rollback('${h.version}')">Make current</button>`:''}</td>
  </tr>`).join('')||'<tr><td colspan=6><small>No firmware uploaded yet.</small></td></tr>';

  const d=await (await fetch('/api/devices')).json();
  $('#devices tbody').innerHTML=Object.entries(d).map(([id,c])=>`<tr>
    <td>${id}</td><td>${c.device}</td><td>${c.fw}</td>
    <td><small>${c.lastSeen.replace('T',' ').slice(0,19)}</small></td><td><small>${c.ip||''}</small></td>
  </tr>`).join('')||'<tr><td colspan=5><small>No devices have checked in yet.</small></td></tr>';
}
async function rollback(version){
  const token=$('#up [name=token]').value;
  const r=await fetch('/api/rollback',{method:'POST',headers:{'Content-Type':'application/json',
    ...(token?{Authorization:'Bearer '+token}:{})},body:JSON.stringify({version})});
  $('#msg').textContent=r.ok?`Rolled current version to ${version}`:(await r.json()).error;
  refresh();
}
$('#up').addEventListener('submit',async e=>{
  e.preventDefault();
  const fd=new FormData(e.target);
  const r=await fetch('/api/upload',{method:'POST',body:fd});
  const j=await r.json();
  $('#msg').textContent=r.ok?`Published ${j.current}`:(j.error||'upload failed');
  if(r.ok)e.target.reset();
  refresh();
});
refresh();setInterval(refresh,10000);
</script>
</body>
</html>
