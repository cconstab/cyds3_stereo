; CYD-S3 Stereo — resilient internet radio player
; Target: Freenove FNK0104S (ESP32-S3R8, 16MB flash, 8MB octal PSRAM, 4.0" ST7796 touch)

[platformio]
default_envs = fnk0104s

[env:fnk0104s]
; pioarduino platform -> Arduino core 3.x (IDF 5), required by ESP32-audioI2S v3.x / ESP_I2S
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions_16mb_ota.csv
board_build.filesystem = littlefs
; ESP32-S3R8: quad flash + octal PSRAM
board_build.arduino.memory_type = qio_opi

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

extra_scripts = post:scripts/merge_bin.py

lib_deps =
    lvgl/lvgl@^8.4.0
    bodmer/TFT_eSPI@2.5.43
    bblanchon/ArduinoJson@^7.4.2

build_flags =
    -DFW_VERSION=\"0.1.0\"
    -DFW_DEVICE=\"cyds3-stereo\"
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_HAS_PSRAM
    ; ---- LVGL ----
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    ; ---- TFT_eSPI: Freenove FNK0104S 4.0" ST7796 setup (from their TFT_eSPI_Setups v1.2) ----
    -DUSER_SETUP_LOADED=1
    -DST7796_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_INVERSION_ON=1
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=46
    -DTFT_RST=-1
    -DTFT_MISO=-1
    ; backlight is driven by our own LEDC PWM (brightness control), not TFT_eSPI
    -DTFT_BL=-1
    -DSPI_FREQUENCY=80000000
    -DUSE_HSPI_PORT=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1
