; CYD-S3 Stereo — resilient internet radio player
; Variants:
;   fnk0104b — Freenove 2.8" 240x320 ILI9341 touch (default)
;   fnk0104s — Freenove 4.0" 320x480 ST7796 touch
; Both: ESP32-S3R8, 16MB flash, 8MB octal PSRAM. Touch/audio/SD/IO pins identical.

[platformio]
default_envs = fnk0104b

[common]
; pioarduino platform -> Arduino core 3.x (IDF 5), required by ESP32-audioI2S v3.x
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
extra_scripts = post:scripts/merge_bin.py
lib_deps =
    lvgl/lvgl@^8.4.0
    bodmer/TFT_eSPI@2.5.43
    bblanchon/ArduinoJson@^7.4.2
build_flags =
    -DFW_VERSION=\"0.1.1\"
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_HAS_PSRAM
    ; ---- LVGL ----
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    ; ---- TFT_eSPI: pins shared by both variants (Freenove TFT_eSPI_Setups v1.2) ----
    -DUSER_SETUP_LOADED=1
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=46
    -DTFT_RST=-1
    ; backlight is driven by our own LEDC PWM (brightness control), not TFT_eSPI
    -DTFT_BL=-1
    -DUSE_HSPI_PORT=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1

[env]
extends = common
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions_16mb_ota.csv
board_build.filesystem = littlefs
; ESP32-S3R8: quad flash + octal PSRAM
board_build.arduino.memory_type = qio_opi

[env:fnk0104b]
build_flags =
    ${common.build_flags}
    -DFW_DEVICE=\"cyds3-stereo\"
    -DTFT_INVERSION_ON=1
    -DILI9341_2_DRIVER=1
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=13
    ; 27MHz: Freenove ships 40MHz but marginal units show line artifacts; ILI9341 spec is 10MHz-class,
    ; 27MHz is the widely-safe overclock. Bump back to 40MHz if your unit is clean.
    -DSPI_FREQUENCY=27000000

[env:fnk0104s]
build_flags =
    ${common.build_flags}
    -DFW_DEVICE=\"cyds3-stereo-s\"
    -DTFT_INVERSION_ON=1
    -DST7796_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=-1
    -DSPI_FREQUENCY=80000000
